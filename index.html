<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>landpage New tech AI</title>

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
      
<body>

    <header>

        <h1>NEW TECH AI</h1>
       <img src="securityIII.png" alt="Icone segurança"width="200" height="150">       

        <p>Transformando Boas ideias em soluções digitais.</p>
 
        <button id="btnSaibaMais">
            Saiba Mais
        </button>

    </header>

    <section class="cep">

        <h2>Consultar CEP</h2>

        <input
            type="text"
            id="cep"
            placeholder="Digite o CEP">

        <button id="buscarCep">
            Buscar
        </button>

        <div id="resultado"></div>

    </section>

    <section>

        <h2>Contato</h2>

        <form>

            <input
                type="text"
                placeholder="Nome"
                required>
            <input
                type="email"
                placeholder="e-mail"
                required>

            <textarea
                placeholder="Mensagem"
                required>
            </textarea>

            <button type="submit">
                Enviar
            </button>

        </form>

    </section>

    <script src="script.js"></script>

</body>

</html>
